<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Manisa İlçe Haritası</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f13;
  --surface:#1a1a22;
  --surface2:#22222d;
  --border:#2e2e3e;
  --accent:#6c63ff;
  --accent2:#ff6584;
  --text:#e8e8f0;
  --muted:#7a7a9a;
  --radius:14px;
  --panel-w:300px;
}

html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  z-index:10;
}
.topbar-title{
  flex:1;
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:700;
  color:var(--text);
  background:transparent;border:none;outline:none;
  min-width:0;
}
.topbar-title::placeholder{color:var(--muted)}

.tbtn{
  flex-shrink:0;
  font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:600;
  padding:8px 12px;border-radius:9px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--muted);cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.tbtn:hover{border-color:var(--accent);color:var(--text)}
.tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tbtn.dl{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;border:none}
.tbtn.dl:hover{opacity:.9}

/* ── BODY LAYOUT ── */
.app-body{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ── MAP AREA ── */
.map-wrap{
  flex:1;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px;
  background:var(--bg);
}

#export-area{
  background:#fff;
  border-radius:var(--radius);
  padding:18px;
  width:100%;
  max-width:600px;
}
#mapTitleDisplay{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;
  text-align:center;
  color:#1a1a2e;
  margin-bottom:12px;
  min-height:22px;
}

#manisa-map{width:100%;height:auto;display:block}

.ilce-path{cursor:pointer;transition:filter .15s}
.ilce-path:hover{filter:brightness(.85)}

/* Legend on map */
.map-legend{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #e0e0e0;
  display:flex;flex-wrap:wrap;gap:10px;
}
.map-legend-item{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;color:#333;
  font-family:'DM Sans',sans-serif;
}
.map-legend-swatch{
  width:12px;height:12px;border-radius:3px;flex-shrink:0;
}

/* ── SIDE PANEL ── */
.side-panel{
  width:var(--panel-w);
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow:hidden;
}

/* tabs */
.panel-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.ptab{
  flex:1;padding:13px 4px;
  font-family:'Syne',sans-serif;
  font-size:12px;font-weight:700;
  text-align:center;
  border:none;background:transparent;
  color:var(--muted);cursor:pointer;
  transition:color .2s;
  border-bottom:3px solid transparent;
}
.ptab.active{color:var(--accent);border-bottom-color:var(--accent)}

.panel-body{
  flex:1;overflow-y:auto;padding:16px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.sec-label{
  font-size:10px;font-weight:700;
  color:var(--muted);letter-spacing:1px;
  text-transform:uppercase;
  margin:14px 0 8px;
}
.sec-label:first-child{margin-top:0}

/* Color grid */
.color-grid{
  display:grid;grid-template-columns:repeat(8,1fr);gap:6px;
}
.cbtn{
  aspect-ratio:1;border-radius:7px;cursor:pointer;
  border:2px solid transparent;
  transition:transform .12s,border-color .12s;
}
.cbtn:hover{transform:scale(1.1)}
.cbtn.active{border-color:#fff;transform:scale(1.12);box-shadow:0 0 10px rgba(255,255,255,.3)}

/* Custom color */
.custom-row{
  display:flex;align-items:center;gap:10px;margin-top:4px;
}
#customColor{
  width:44px;height:40px;
  border:1px solid var(--border);
  border-radius:9px;cursor:pointer;
  background:transparent;padding:2px;
}
.hex-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent)}
.use-custom-btn{
  margin-left:auto;font-size:11px;padding:6px 10px;
  border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:600;
  transition:all .2s;
}
.use-custom-btn:hover{border-color:var(--accent);color:var(--accent)}
.use-custom-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* District list */
.dist-list{display:flex;flex-direction:column;gap:5px}
.ditem{
  display:flex;align-items:center;gap:10px;
  padding:9px 11px;border-radius:10px;
  background:var(--surface2);
  border:1px solid transparent;
  cursor:pointer;font-size:13px;
  transition:border-color .15s;
}
.ditem:hover{border-color:var(--accent)}
.ditem-swatch{
  width:14px;height:14px;border-radius:4px;flex-shrink:0;
  border:1px solid rgba(255,255,255,.1);
}
.ditem-name{flex:1;font-weight:500}

/* Legend tab */
.legend-items{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.legend-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 11px;border-radius:10px;
  background:var(--surface2);
  border:1px solid var(--border);
}
.legend-swatch{
  width:18px;height:18px;border-radius:5px;flex-shrink:0;
  cursor:pointer;border:2px solid transparent;
  transition:border-color .15s;
}
.legend-swatch:hover{border-color:#fff}
.legend-label-input{
  flex:1;background:transparent;border:none;
  color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;outline:none;
  min-width:0;
}
.legend-label-input::placeholder{color:var(--muted)}
.legend-del{
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:16px;padding:2px 4px;
  border-radius:5px;transition:color .15s;
}
.legend-del:hover{color:var(--accent2)}

.legend-add-row{display:flex;flex-direction:column;gap:8px}
.legend-new-label{
  padding:10px 12px;border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;outline:none;
  transition:border-color .2s;
}
.legend-new-label:focus{border-color:var(--accent)}
.legend-new-label::placeholder{color:var(--muted)}
.legend-add-btn{
  padding:10px;border-radius:10px;
  border:none;background:var(--accent);
  color:#fff;font-family:'Syne',sans-serif;
  font-weight:700;font-size:13px;cursor:pointer;
  transition:opacity .2s;
}
.legend-add-btn:hover{opacity:.85}

.legend-preview-label{
  font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;
  margin:16px 0 8px;
}
.legend-preview{
  background:var(--surface2);border-radius:10px;
  padding:12px;border:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:10px;
  min-height:40px;
}
.legend-preview-item{
  display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;
}
.legend-preview-swatch{
  width:12px;height:12px;border-radius:3px;flex-shrink:0;
}

/* color-picker popover for legend swatch */
.swatch-picker{
  position:absolute;z-index:999;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
  width:200px;
}
.swatch-picker-grid{
  display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:8px;
}
.swatch-cbtn{
  aspect-ratio:1;border-radius:5px;cursor:pointer;
  border:2px solid transparent;transition:transform .1s;
}
.swatch-cbtn:hover{transform:scale(1.12)}
.swatch-cbtn.active{border-color:#fff}
.swatch-custom-row{display:flex;align-items:center;gap:6px}
.swatch-custom-row input[type=color]{
  width:34px;height:30px;border:none;
  border-radius:7px;cursor:pointer;background:transparent;
  padding:1px;border:1px solid var(--border);
}
.swatch-apply{
  flex:1;padding:6px;border-radius:7px;border:none;
  background:var(--accent);color:#fff;
  font-size:11px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;
}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{
  display:none;
  background:var(--surface);
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.bottom-nav-tabs{
  display:flex;
}
.bnav-tab{
  flex:1;padding:12px 4px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  border:none;background:transparent;color:var(--muted);
  cursor:pointer;font-family:'Syne',sans-serif;
  font-size:10px;font-weight:700;
  transition:color .2s;
}
.bnav-tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.bnav-tab.active{color:var(--accent)}

/* Mobile sheet */
.mobile-sheet{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  z-index:100;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:70vh;
  flex-direction:column;
}
.mobile-sheet.open{transform:translateY(0)}
.sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--border);margin:10px auto 6px;flex-shrink:0;
}
.sheet-body{overflow-y:auto;padding:12px 16px 30px;flex:1}

/* ── RESPONSIVE ── */
@media (max-width: 700px){
  html,body{overflow:hidden}
  .side-panel{display:none}
  .map-wrap{padding:10px;justify-content:flex-start;overflow-y:auto;padding-bottom:80px}
  #export-area{max-width:100%;border-radius:12px;padding:12px}
  .bottom-nav{display:flex;flex-direction:column}
  .mobile-sheet{display:flex}
  body{overflow:hidden}
}
@media (max-width:400px){
  .topbar-title{font-size:15px}
  .tbtn{font-size:11px;padding:7px 9px}
}
</style>
</head>

          <path id="sarigol" class="ilce-path" data-name="SARIGÖL" d="M271.8,272.8c-4.9-4.9-2.3-16.1-12-14.9c-3.9,0.5-7-1.1-10.8-1.3c-4-0.2-5.7,2.3-6.8,5.8c-1.1,3.4-2.2,5.6-4.8,8.2c-2.4,2.4-4.6,4.8-3.8,8.5c0.4,1.9,1.2,3.6,0.6,5.7c-0.6,1.9-2.2,3.3-3.4,4.9c-1.3,1.8-2.3,3.8-3.6,5.7c-1.2,1.7-2.6,3.2-3.7,4.9c5.8,2.9,12.8,6.7,19.1,3.2c5.8-3.1,6.3-9.6,9.8-14.4c3-4.2,9-3.4,12.9-6.1c1.1-0.7,1.9-1.9,3-2.6c1.3-0.8,2.9-0.4,4.2-1.2Z" fill="#555568" stroke="#1a1a22" stroke-width="1"/>
        </g>
        <g id="labelsGroup">
          <text x="118" y="118" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">AKHİSAR</text>
          <text x="255" y="138" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">DEMİRCİ</text>
          <text x="292" y="156" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">SELENDİ</text>

          <text x="77" y="44" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">SOMA</text>

          <text x="90" y="243" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">TURGUTLU</text>
          <text x="176" y="207" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">SALİHLİ</text>
          <text x="192" y="160" font-size="6.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">KÖPRÜBAŞI</text>
          <text x="244" y="200" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">KULA</text>
          <text x="203" y="265" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">ALAŞEHİR</text>
          <text x="247" y="281" font-size="7.5" fill="#fff" text-anchor="middle" font-weight="600" font-family="DM Sans,sans-serif">SARIGÖL</text>

      <div id="mapLegend" class="map-legend" style="display:none"></div>
    </div>
  </div>

  <!-- SIDE PANEL (desktop) -->
  <div class="side-panel">
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchTab('renk',this,false)">Renk</button>
      <button class="ptab" onclick="switchTab('ilce',this,false)">İlçeler</button>
      <button class="ptab" onclick="switchTab('lejant',this,false)">Lejant</button>
    </div>
    <div class="panel-body" id="desktopPanelBody">
      <!-- injected by JS -->
    </div>

</div>

<!-- BOTTOM NAV (mobile) -->
<div class="bottom-nav">
  <div class="bottom-nav-tabs">
    <button class="bnav-tab active" onclick="openSheet('renk',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
      Renk
    </button>
    <button class="bnav-tab" onclick="openSheet('ilce',this)">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      İlçeler
    </button>
    <button class="bnav-tab" onclick="openSheet('lejant',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Lejant
    </button>
  </div>
</div>

<!-- MOBILE SHEET -->
<div class="mobile-sheet" id="mobileSheet">
  <div class="sheet-handle" onclick="closeSheet()"></div>
  <div class="sheet-body" id="mobileSheetBody">
    <!-- injected by JS -->
  </div>
</div>

<script>
const COLORS=[
  '#6c63ff','#4361ee','#3a0ca3','#7209b7','#b5179e','#f72585',
  '#ff6584','#ff4757','#ff6348','#ffa502','#eccc68','#2ed573',
  '#1e90ff','#00cec9','#fdcb6e','#636e72',
  '#ffffff','#b2bec3','#636e72','#2d3436'
];

const DISTRICTS=[
  {id:'akhisar',name:'AKHİSAR'},{id:'demirci',name:'DEMİRCİ'},{id:'selendi',name:'SELENDİ'},
  {id:'gordes',name:'GÖRDES'},{id:'kirkagac',name:'KIRKAĞAÇ'},{id:'soma',name:'SOMA'},
  {id:'sehzadeler',name:'ŞEHZADELER'},{id:'yunusemre',name:'YUNUSEMRE'},{id:'saruhanli',name:'SARUHANLI'},
  {id:'golmarmara',name:'GÖLMARMARA'},{id:'ahmetli',name:'AHMETLİ'},{id:'turgutlu',name:'TURGUTLU'},
  {id:'salihli',name:'SALİHLİ'},{id:'koprubasi',name:'KÖPRÜBAŞI'},{id:'kula',name:'KULA'},
  {id:'alasehir',name:'ALAŞEHİR'},{id:'sarigol',name:'SARIGÖL'}
];

let selectedColor = COLORS[0];
let districtColors = {};
let legendItems = []; // [{id, color, label}]
let legendIdCounter = 0;
let activePicker = null; // {legendId, el}
let currentTab = 'renk';
let sheetOpen = false;

// title
const mapTitleInput = document.getElementById('mapTitle');
const mapTitleDisplay = document.getElementById('mapTitleDisplay');
mapTitleInput.oninput = () => { mapTitleDisplay.innerText = mapTitleInput.value; };
mapTitleDisplay.innerText = mapTitleInput.value;

// map click
document.querySelectorAll('.ilce-path').forEach(p => {
  p.onclick = () => {
    p.setAttribute('fill', selectedColor);
    districtColors[p.id] = selectedColor;
    renderPanel();
  };
});

// ── PANEL CONTENT BUILDERS ──

function buildRenkHTML(){
  return `
    <div class="sec-label">Palet</div>
    <div class="color-grid" id="paletGrid">
      ${COLORS.map(c=>`<div class="cbtn${c===selectedColor?' active':''}" style="background:${c}" data-c="${c}" onclick="selectColor('${c}',this)"></div>`).join('')}
    </div>
    <div class="sec-label">Özel Renk</div>
    <div class="custom-row">
      <input type="color" id="customColorPicker" value="${selectedColor}" oninput="onCustomColorInput(this)"/>
      <span class="hex-val" id="hexDisplay">${selectedColor.toUpperCase()}</span>
      <button class="use-custom-btn" id="useCustomBtn" onclick="applyCustomColor()">Uygula</button>
    </div>
  `;
}

function buildIlceHTML(){
  return `<div class="dist-list">${DISTRICTS.map(d=>{
    const c = districtColors[d.id]||'#555568';
    return `<div class="ditem" onclick="paintDistrict('${d.id}')">
      <div class="ditem-swatch" style="background:${c}"></div>
      <span class="ditem-name">${d.name}</span>
    </div>`;
  }).join('')}</div>`;
}

function buildLejantHTML(){
  const items = legendItems.map(item=>`
    <div class="legend-item" data-id="${item.id}">
      <div class="legend-swatch" style="background:${item.color}" onclick="openSwatchPicker(${item.id},this)" title="Renk değiştir"></div>
      <input class="legend-label-input" type="text" value="${item.label}" placeholder="Kategori adı..." 
        onchange="updateLegendLabel(${item.id},this.value)" oninput="updateLegendLabel(${item.id},this.value)"/>
      <button class="legend-del" onclick="deleteLegendItem(${item.id})" title="Sil">✕</button>
    </div>
  `).join('');

  const preview = legendItems.length ? `
    <div class="legend-preview-label">Harita Önizlemesi</div>
    <div class="legend-preview">
      ${legendItems.map(i=>`
        <div class="legend-preview-item">
          <div class="legend-preview-swatch" style="background:${i.color}"></div>
          ${i.label||'—'}
        </div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="legend-items">${items}</div>
    <div class="legend-add-row">
      <input class="legend-new-label" type="text" id="newLegendLabel" placeholder="Yeni kategori adı..." 
        onkeydown="if(event.key==='Enter')addLegend()"/>
      <button class="legend-add-btn" onclick="addLegend()">+ Lejant Ekle</button>
    </div>
    ${preview}
  `;
}

function renderPanel(){
  const desktop = document.getElementById('desktopPanelBody');
  const mobile = document.getElementById('mobileSheetBody');
  let html = '';
  if(currentTab==='renk') html = buildRenkHTML();
  else if(currentTab==='ilce') html = buildIlceHTML();
  else html = buildLejantHTML();
  desktop.innerHTML = html;
  mobile.innerHTML = html;
}

function switchTab(tab, btn, isMobile){
  currentTab = tab;
  // desktop tabs
  document.querySelectorAll('.panel-tabs .ptab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel-tabs .ptab').forEach(b=>{ if(b.textContent.toLowerCase().includes(tab==='renk'?'renk':tab==='ilce'?'i̇lçe':tab)) b.classList.add('active'); });
  renderPanel();
}

// ── COLORS ──
function selectColor(c, el){
  selectedColor = c;
  // update active state in both panels
  document.querySelectorAll('.cbtn').forEach(b=>{
    b.classList.toggle('active', b.dataset.c===c);
  });
  document.querySelectorAll('#hexDisplay').forEach(el=>el.textContent=c.toUpperCase());
  const pickers = document.querySelectorAll('#customColorPicker');
  pickers.forEach(p=>p.value=c);
}

function onCustomColorInput(input){
  const c = input.value;
  document.querySelectorAll('#hexDisplay').forEach(el=>el.textContent=c.toUpperCase());
}

function applyCustomColor(){
  const pickers = document.querySelectorAll('#customColorPicker');
  const c = pickers[0] ? pickers[0].value : selectedColor;
  selectedColor = c;
  document.querySelectorAll('#hexDisplay').forEach(el=>el.textContent=c.toUpperCase());
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));
}

function paintDistrict(id){
  const el = document.getElementById(id);
  if(el){ el.setAttribute('fill', selectedColor); districtColors[id]=selectedColor; }
  renderPanel();
}

// ── LEGEND ──
function addLegend(){
  const inputs = document.querySelectorAll('#newLegendLabel');
  const label = inputs[0] ? inputs[0].value.trim() : '';
  legendItems.push({id:++legendIdCounter, color:selectedColor, label: label||'Kategori '+(legendIdCounter)});
  updateMapLegend();
  renderPanel();
}

function deleteLegendItem(id){
  legendItems = legendItems.filter(i=>i.id!==id);
  updateMapLegend();
  renderPanel();
}

function updateLegendLabel(id, val){
  const item = legendItems.find(i=>i.id===id);
  if(item){ item.label=val; updateMapLegend(); }
  // update preview inside same render without full re-render
  const previews = document.querySelectorAll('.legend-preview');
  previews.forEach(p=>{
    p.innerHTML = legendItems.map(i=>`
      <div class="legend-preview-item">
        <div class="legend-preview-swatch" style="background:${i.color}"></div>
        ${i.label||'—'}
      </div>
    `).join('');
  });
}

// Swatch color picker (popover)
function openSwatchPicker(legendId, swatchEl){
  // close if same
  const existing = document.getElementById('swatchPopover');
  if(existing){ existing.remove(); activePicker=null; if(activePicker && activePicker.legendId===legendId) return; }

  activePicker = {legendId};
  const pop = document.createElement('div');
  pop.className='swatch-picker';
  pop.id='swatchPopover';

  const item = legendItems.find(i=>i.id===legendId);
  const curColor = item ? item.color : '#ffffff';

  pop.innerHTML=`
    <div class="swatch-picker-grid">
      ${COLORS.map(c=>`<div class="swatch-cbtn${c===curColor?' active':''}" style="background:${c}" onclick="applySwatchColor(${legendId},'${c}',this)"></div>`).join('')}
    </div>
    <div class="swatch-custom-row">
      <input type="color" value="${curColor}" id="swatchCustom" oninput="onSwatchCustom(${legendId},this)"/>
      <button class="swatch-apply" onclick="applySwatchCustom(${legendId})">Uygula</button>
    </div>
  `;

  // position
  const rect = swatchEl.getBoundingClientRect();
  pop.style.position='fixed';
  pop.style.left = Math.min(rect.left, window.innerWidth-210)+'px';
  pop.style.top = (rect.bottom+6)+'px';
  document.body.appendChild(pop);

  // close on outside click
  setTimeout(()=>{
    document.addEventListener('click', function handler(e){
      if(!pop.contains(e.target) && e.target!==swatchEl){
        pop.remove(); activePicker=null;
        document.removeEventListener('click',handler);
      }
    });
  },10);
}

function applySwatchColor(legendId, color, el){
  const item = legendItems.find(i=>i.id===legendId);
  if(item){ item.color=color; }
  updateMapLegend();
  const pop = document.getElementById('swatchPopover');
  if(pop){ pop.querySelectorAll('.swatch-cbtn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
  // update swatch el in list
  renderPanel();
  // reopen same position trick: just re-render & close
  const p2 = document.getElementById('swatchPopover');
  if(p2) p2.remove();
}

function onSwatchCustom(legendId, input){
  // just update input, apply on button
}
function applySwatchCustom(legendId){
  const input = document.getElementById('swatchCustom');
  if(!input) return;
  const item = legendItems.find(i=>i.id===legendId);
  if(item){ item.color=input.value; }
  updateMapLegend();
  const p = document.getElementById('swatchPopover');
  if(p) p.remove();
  renderPanel();
}

function updateMapLegend(){
  const leg = document.getElementById('mapLegend');
  if(legendItems.length===0){ leg.style.display='none'; leg.innerHTML=''; return; }
  leg.style.display='flex';
  leg.innerHTML = legendItems.map(i=>`
    <div class="map-legend-item">
      <div class="map-legend-swatch" style="background:${i.color}"></div>
      ${i.label||'—'}
    </div>
  `).join('');
}

// ── TOGGLES ──
function toggleLabels(){
  const g = document.getElementById('labelsGroup');
  const vis = g.style.display!=='none';
  g.style.display = vis?'none':'block';
  document.getElementById('btnLabels').classList.toggle('active',!vis);
}
function toggleBorders(){
  const paths = document.querySelectorAll('.ilce-path');
  const cur = paths[0].getAttribute('stroke-width');
  const next = cur==='1'?'0':'1';
  paths.forEach(p=>p.setAttribute('stroke-width',next));
  document.getElementById('btnBorder').classList.toggle('active',next==='1');
}

// ── MOBILE SHEET ──
function openSheet(tab, btn){
  // nav active
  document.querySelectorAll('.bnav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  if(sheetOpen && currentTab===tab){ closeSheet(); return; }
  currentTab = tab;
  renderPanel();
  const sheet = document.getElementById('mobileSheet');
  sheet.classList.add('open');
  sheetOpen = true;
}
function closeSheet(){
  document.getElementById('mobileSheet').classList.remove('open');
  sheetOpen = false;
}
// close sheet on map tap
document.querySelector('.map-wrap').addEventListener('click', e=>{
  if(sheetOpen && !e.target.closest('.ilce-path') && e.target.tagName!=='path') closeSheet();
});

// ── DOWNLOAD ──
function downloadMap(){
  const area = document.getElementById('export-area');
  html2canvas(area,{backgroundColor:'#ffffff',scale:3,logging:false}).then(c=>{
    const a=document.createElement('a');
    a.download='manisa-harita.png';
    a.href=c.toDataURL('image/png');
    a.click();
  });
}

// ── INIT ──
// sync desktop tabs click
document.querySelectorAll('.panel-tabs .ptab').forEach((btn,i)=>{
  const tabs=['renk','ilce','lejant'];
  btn.onclick=()=>switchTab(tabs[i],btn,false);
});

renderPanel();
</script>
