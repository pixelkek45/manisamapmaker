
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary)}
.wrap{display:flex;flex-direction:column;gap:0;padding:12px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 12px;background:var(--color-background-secondary);border-radius:10px 10px 0 0;border:0.5px solid var(--color-border-tertiary)}
.toolbar input[type=text]{font-size:15px;font-weight:500;border:none;background:transparent;color:var(--color-text-primary);outline:none;min-width:180px;flex:1}
.toolbar input[type=text]::placeholder{color:var(--color-text-tertiary)}
.sep{width:0.5px;height:24px;background:var(--color-border-secondary);flex-shrink:0}
.tbtn{font-size:12px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary);white-space:nowrap}
.tbtn:hover{background:var(--color-background-tertiary)}
.tbtn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.main{display:flex;gap:0;border:0.5px solid var(--color-border-tertiary);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.map-area{flex:1;min-width:0;background:var(--color-background-primary);padding:8px}
.panel{width:220px;flex-shrink:0;border-left:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:flex;flex-direction:column;overflow:hidden}
.panel-tab{display:flex;border-bottom:0.5px solid var(--color-border-tertiary)}
.ptab{flex:1;font-size:11px;padding:7px 4px;text-align:center;cursor:pointer;color:var(--color-text-secondary);border:none;background:transparent;font-family:inherit}
.ptab.active{color:var(--color-text-primary);font-weight:500;background:var(--color-background-primary);border-bottom:2px solid var(--color-text-primary)}
.panel-body{flex:1;padding:10px;overflow-y:auto}
.sec-label{font-size:10px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:12px}
.cbtn{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s}
.cbtn:hover{transform:scale(1.2)}
.cbtn.active{border-color:var(--color-text-primary);transform:scale(1.15)}
.dist-list{display:flex;flex-direction:column;gap:3px}
.ditem{display:flex;align-items:center;gap:7px;font-size:11px;cursor:pointer;padding:4px 6px;border-radius:6px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.ditem:hover{background:var(--color-background-tertiary)}
.ddot{width:12px;height:12px;border-radius:3px;flex-shrink:0;border:1px solid rgba(128,128,128,0.2)}
.legend-list{display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary)}
.legend-swatch{width:16px;height:16px;border-radius:4px;flex-shrink:0;border:1px solid rgba(128,128,128,0.2)}
.legend-input{font-size:11px;border:none;background:transparent;color:var(--color-text-primary);outline:none;flex:1;min-width:0}
.legend-del{font-size:14px;cursor:pointer;color:var(--color-text-tertiary);line-height:1;padding:0 2px}
.legend-del:hover{color:var(--color-text-primary)}
.add-legend-row{display:flex;gap:6px;margin-top:8px}
.add-legend-input{flex:1;font-size:11px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.add-legend-btn{font-size:11px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary)}
.add-legend-btn:hover{background:var(--color-background-tertiary)}
.reset-btn{width:100%;font-size:11px;padding:5px;margin-top:8px;cursor:pointer;background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:6px;color:var(--color-text-secondary)}
.reset-btn:hover{background:var(--color-background-tertiary)}
.tip{font-size:10px;color:var(--color-text-tertiary);margin-top:8px;line-height:1.5}
.legend-preview{margin-top:12px;padding:10px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;background:var(--color-background-primary)}
.legend-preview-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px}
.ilce-path{cursor:pointer;transition:opacity 0.12s}
.ilce-path:hover{opacity:0.75}
svg text{pointer-events:none;user-select:none}
</style>

  {id:'sehzadeler',name:'ŞEHZADELER'},{id:'yunusemre',name:'YUNUSEMRE'},{id:'saruhanli',name:'SARUHANLI'},
  {id:'golmarmara',name:'GÖLMARMARA'},{id:'ahmetli',name:'AHMETLİ'},{id:'turgutlu',name:'TURGUTLU'},
  {id:'salihli',name:'SALİHLİ'},{id:'koprubasi',name:'KÖPRÜBAŞI'},{id:'kula',name:'KULA'},
  {id:'alasehir',name:'ALAŞEHİR'},{id:'sarigol',name:'SARIGÖL'}
];

let selectedColor=COLORS[0];
let districtColors={};
let labelsVisible=true;
let bordersVisible=true;
let legendItems=[];

const colorGrid=document.getElementById('colorGrid');
const districtList=document.getElementById('districtList');

COLORS.forEach((c,i)=>{
  const btn=document.createElement('div');
  btn.className='cbtn'+(i===0?' active':'');
  btn.style.background=c;
  if(c==='#ffffff')btn.style.border='2px solid #ccc';
  btn.onclick=()=>{
    document.querySelectorAll('.cbtn').forEach(b=>{b.classList.remove('active');if(b.style.background!=='rgb(255,255,255)')b.style.borderColor='transparent';});
    btn.classList.add('active');btn.style.borderColor='#333';
    selectedColor=c;
    document.getElementById('customColor').value=c;
  };
  colorGrid.appendChild(btn);
});

document.getElementById('customColor').oninput=e=>{
  selectedColor=e.target.value;
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));
};

function useCustomColor(){
  selectedColor=document.getElementById('customColor').value;
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));
}

function setDistrictColor(id,color){
  districtColors[id]=color;
  const p=document.getElementById(id);
  if(p)p.setAttribute('fill',color);
  buildDistrictList();
}

function buildDistrictList(){
  districtList.innerHTML='';
  DISTRICTS.forEach(d=>{
    const item=document.createElement('div');
    item.className='ditem';
    const col=districtColors[d.id]||'#aaa';
    item.innerHTML=`<div class="ddot" style="background:${col}"></div><span class="d-name" style="font-size:11px">${d.name}</span>`;
    item.onclick=()=>setDistrictColor(d.id,selectedColor);
    districtList.appendChild(item);
  });
}

function resetAll(){
  districtColors={};
  DISTRICTS.forEach(d=>{
    const p=document.getElementById(d.id);
    if(p)p.setAttribute('fill','#aaa');
  });
  buildDistrictList();
}

function toggleLabels(){
  labelsVisible=!labelsVisible;
  document.getElementById('labelsGroup').style.display=labelsVisible?'block':'none';
  document.getElementById('btnLabels').classList.toggle('active',labelsVisible);
}

function toggleBorders(){
  bordersVisible=!bordersVisible;
  document.querySelectorAll('.ilce-path').forEach(p=>{
    p.setAttribute('stroke-width',bordersVisible?'1':'0');
  });
  document.getElementById('btnBorder').classList.toggle('active',bordersVisible);
}

document.getElementById('mapTitle').oninput=e=>{
  document.getElementById('mapTitleDisplay').textContent=e.target.value;
};
document.getElementById('mapTitleDisplay').textContent=document.getElementById('mapTitle').value;

document.querySelectorAll('.ilce-path').forEach(p=>{
  p.onclick=()=>setDistrictColor(p.id,selectedColor);
});

function switchTab(name,btn){
  ['renk','ilce','lejant'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='ilce')buildDistrictList();
}

function addLegendItem(){
  const lbl=document.getElementById('legendLabelInput').value.trim()||'Kategori';
  legendItems.push({color:selectedColor,label:lbl});
  document.getElementById('legendLabelInput').value='';
  buildLegend();
}

function buildLegend(){
  const list=document.getElementById('legendList');
  const preview=document.getElementById('legendPreview');
  const previewItems=document.getElementById('legendPreviewItems');
  list.innerHTML='';
  previewItems.innerHTML='';
  if(legendItems.length===0){preview.style.display='none';return;}
  preview.style.display='block';
  legendItems.forEach((item,i)=>{
    const row=document.createElement('div');
    row.className='legend-item';
    row.innerHTML=`<div class="legend-swatch" style="background:${item.color}"></div><input class="legend-input" value="${item.label}" oninput="legendItems[${i}].label=this.value;rebuildPreview()"><span class="legend-del" onclick="legendItems.splice(${i},1);buildLegend()">×</span>`;
    list.appendChild(row);
    const prow=document.createElement('div');
    prow.style.cssText='display:flex;align-items:center;gap:6px';
    prow.innerHTML=`<div style="width:12px;height:12px;border-radius:3px;background:${item.color};flex-shrink:0;border:1px solid rgba(128,128,128,0.2)"></div><span style="font-size:11px;color:var(--color-text-primary)">${item.label}</span>`;
    previewItems.appendChild(prow);
  });
  const titleEl=document.getElementById('legendPreviewTitle');
  titleEl.textContent=document.getElementById('mapTitle').value||'Lejant';
}

function rebuildPreview(){
  const previewItems=document.getElementById('legendPreviewItems');
  previewItems.innerHTML='';
  legendItems.forEach(item=>{
    const prow=document.createElement('div');
    prow.style.cssText='display:flex;align-items:center;gap:6px';
    prow.innerHTML=`<div style="width:12px;height:12px;border-radius:3px;background:${item.color};flex-shrink:0;border:1px solid rgba(128,128,128,0.2)"></div><span style="font-size:11px;color:var(--color-text-primary)">${item.label}</span>`;
    previewItems.appendChild(prow);
  });
}

buildDistrictList();
document.getElementById('btnLabels').classList.add('active');
document.getElementById('btnBorder').classList.add('active');
</script>
